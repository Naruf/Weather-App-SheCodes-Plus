<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>My weather application</title>
    <style>
      a {
        color: #885df1;
        font-weight: 400;
      }
      body {
        background-color: #f9f7fe;
        font-family: "Roboto", sans-serif;
        font-optical-sizing: auto;
        font-weight: 300;
        font-style: normal;
        font-variation-settings: "wdth" 100;
      }
      footer {
        font-size: 12px;
        color: rgba(0, 0, 0, 0.6);
        text-align: center;
        padding: 3px;
      }
      hr {
        margin-top: -40px;
        border: none;
        border-top: 1px solid rgb(249, 247, 254);
      }
      main h1 {
        font-size: 28px;
        font-weight: 900;
        padding: 25px 0 0 0;
      }
      main p {
        font-size: 12px;
        color: rgba(0, 0, 0, 0.6);
      }
      strong {
        color: rgba(255, 0, 0, 0.8);
        font-weight: 600;
      }
      .container {
        border: 1px solid;
        border-radius: 10px;
        border-color: transparent;
        background-color: white;
        box-shadow: 3px 6px 15px 10px rgba(221, 213, 238, 0.2);
        display: block;
        font-family: "Roboto", sans-serif;
        font-optical-sizing: auto;
        font-weight: 300;
        font-style: normal;
        font-variation-settings: "wdth" 100;
        max-width: 450px;
        margin: 0 auto;
        margin-top: 40px;
        padding: 20px;
      }
      .current-temperature {
        position: relative;
        display: block;
        right: -310px;
        top: -90px;
        font-size: 60px;
        font-weight: 700;
      }
      .degrees {
        font-size: 20px;
        font-weight: 400;
        position: relative;
        bottom: 29px;
      }
      .headerBlock {
        display: block;
        margin: 0 10px 0 10px 10px;
        font-family: Arial, Helvetica, sans-serif;
      }

      .icon {
        font-size: 30px;
        position: relative;
        left: -10px;
        top: -5px;
      }
      .search-input {
        width: 330px;
        background-color: #f9f7fe;
        border: transparent;
        border-radius: 5px;
        padding: 15px;
        font-size: 12px;
        color: #000;
      }
      .search-button {
        width: 70px;
        background-color: #885df1;
        color: white;
        border-radius: 5px;
        border: transparent;
        padding: 15px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="headerBlock">
        <form id="city-form">
          <input
            class="search-input"
            type="search"
            placeholder="Enter a city.."
            required
            id="city-input"
          />
          <input class="search-button" type="submit" value="Search" />
        </form>
      </header>
      <main>
        <div class="current-weather">
          <div>
            <h1>Paris</h1>
            <p>
              <span id="timeStamp">Saturday 15:32</span>, moderate rain <br />
              Humidity: <strong>87%</strong>, Wind: <strong>7.2km/h</strong>
            </p>
          </div>
          <div class="current-temperature">
            <span class="icon">☀️</span>24<span class="degrees">°C</span>
          </div>
        </div>
      </main>
      <hr />
      <footer>
        <p>
          This project was coded by
          <a href="#" target="_blank">Nadia Ruiz</a> and is
          <a href="#" target="_blank"> on GitHub</a> and
          <a href="#" target="_blank">hosted on Netlify</a>
        </p>
      </footer>
    </div>
    <script>
      function changeCityName(event) {
        event.preventDefault();
        let city = document.querySelector("#city-input");
        let newCity = document.querySelector("h1");
        newCity.innerHTML = city.value;
      }

      let cityForm = document.querySelector("#city-form");
      cityForm.addEventListener("submit", changeCityName);

      function dayTime() {
        let now = new Date();
        let weekdays = [
          "Sunday",
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday",
        ];
        let weekday = weekdays[now.getDay()];
        let hour = now.getHours();
        let minutes = now.getMinutes();
        let timeStamp = document.querySelector("#timeStamp");
        timeStamp.innerHTML = `${weekday} ${hour}:${minutes}`;
      }
      dayTime();
    </script>
  </body>
</html>
